<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#0a0c10"/>
  <!-- Satellite body -->
  <rect x="24" y="26" width="16" height="12" rx="2" fill="#00ff88" opacity="0.9"/>
  <!-- Solar panels -->
  <rect x="6" y="28" width="14" height="8" rx="1" fill="#00ddff" opacity="0.7"/>
  <rect x="44" y="28" width="14" height="8" rx="1" fill="#00ddff" opacity="0.7"/>
  <!-- Panel lines -->
  <line x1="13" y1="28" x2="13" y2="36" stroke="#0a0c10" stroke-width="1"/>
  <line x1="51" y1="28" x2="51" y2="36" stroke="#0a0c10" stroke-width="1"/>
  <!-- Antenna -->
  <line x1="32" y1="26" x2="32" y2="18" stroke="#00ff88" stroke-width="1.5"/>
  <circle cx="32" cy="16" r="2.5" fill="none" stroke="#00ff88" stroke-width="1.5"/>
  <!-- Signal waves -->
  <path d="M26 12 Q32 6 38 12" fill="none" stroke="#ffaa00" stroke-width="1.2" opacity="0.7"/>
  <path d="M22 8 Q32 0 42 8" fill="none" stroke="#ffaa00" stroke-width="1" opacity="0.4"/>
  <!-- Orbit ring -->
  <ellipse cx="32" cy="44" rx="18" ry="4" fill="none" stroke="#00ff88" stroke-width="0.8" opacity="0.3"/>
</svg>
