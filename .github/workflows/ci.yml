name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build containers
        run: docker compose build

      - name: Run backend tests
        run: docker compose run --rm backend pytest -v --tb=short

      - name: Run determinism test
        run: docker compose run --rm backend pytest tests/test_determinism.py -v

      - name: Lint backend
        run: docker compose run --rm backend ruff check app/ tests/

      - name: Verify services start and are healthy
        run: |
          cp .env.example .env
          docker compose up -d
          sleep 20
          curl -f http://localhost:80/health || exit 1
          docker compose down
