services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voss-backend
    expose:
      - "8000"
    volumes:
      - uploads:/app/uploads
      - db_data:/app/data
    environment:
      VOSS_HOST: "0.0.0.0"
      VOSS_PORT: "8000"
      VOSS_UPLOAD_DIR: "/app/uploads"
      VOSS_DATABASE_PATH: "/app/data/voss.db"
      VOSS_LOG_LEVEL: "INFO"
      VOSS_LOG_FORMAT: "json"
      VOSS_MAX_FILE_SIZE_MB: "50"
      VOSS_STAGE_MIN_DELAY_S: "2.0"
      VOSS_STAGE_MAX_DELAY_S: "5.0"
      VOSS_MAX_RETRY_COUNT: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voss-frontend
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: voss-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

volumes:
  uploads:
    name: voss_uploads
  db_data:
    name: voss_db_data
